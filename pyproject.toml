[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
# E/W: PEP8, F: Pyflakes, I: Isort, N: Naming, D: Docstrings (Google), 
# ANN: Annotations, UP: Upgrades, B: Bugbear
select = ["E", "W", "F", "I", "N", "D", "ANN", "UP", "B"]
ignore = []

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.pyupgrade]
keep-runtime-typing = true

[tool.ruff.format]
quote-style = "double"
docstring-code-format = true

[tool.mypy]
python_version = "3.10"
strict = true
disallow_untyped_defs = true
disallow_any_explicit = true
show_error_codes = true
pretty = true

